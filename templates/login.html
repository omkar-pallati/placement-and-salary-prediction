<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="predict-page">

<div class="predict-wrapper">

    <div class="predict-box auth-box">

        <h1>Login</h1>

        {% if error %}

            <p class="auth-error">

                {{ error }}

            </p>

        {% endif %}

        <form action="/login"
              method="POST"
              class="auth-form">

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">

                Login

            </button>

        </form>

        <p class="auth-link">

            Don't have an account?

            <a href="/signup">

                Sign Up

            </a>

        </p>

    </div>

</div>

</body>
</html>
