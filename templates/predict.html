<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Prediction Form</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="predict-page">

<div class="predict-wrapper">

    <div class="predict-box">

        <h1>Placement Prediction Form</h1>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <form action="/predict" method="POST">

            <div class="form-step active">

                <h2>Academic Details</h2>

                <input type="number"
                       name="tenth"
                       placeholder="10th Percentage"
                       required>

                <input type="number"
                       name="twelfth"
                       placeholder="12th Percentage"
                       required>

                <button type="button" class="next-btn">
                    Next
                </button>

            </div>

            <div class="form-step">

                <h2>Engineering Background</h2>

                <input type="number"
                       name="cgpa"
                       placeholder="B.Tech CGPA"
                       step="0.01"
                       required>

                <select name="branch" required>
                    <option value="CSE">CSE</option>
                    <option value="ECE">ECE</option>
                    <option value="EEE">EEE</option>
                    <option value="IT">IT</option>
                    <option value="MECH">MECH</option>
                </select>

                <input type="number"
                       name="backlogs"
                       placeholder="Backlogs"
                       required>

                <div class="button-group">

                    <button type="button" class="prev-btn">
                        Previous
                    </button>

                    <button type="button" class="next-btn">
                        Next
                    </button>

                </div>

            </div>

            <div class="form-step">

                <h2>Skills</h2>

                <input type="number"
                       name="coding"
                       placeholder="Coding Skills"
                       required>

                <input type="number"
                       name="communication"
                       placeholder="Communication Skills"
                       required>

                <input type="number"
                       name="aptitude"
                       placeholder="Aptitude Skills"
                       required>

                <div class="button-group">

                    <button type="button" class="prev-btn">
                        Previous
                    </button>

                    <button type="button" class="next-btn">
                        Next
                    </button>

                </div>

            </div>

            <div class="form-step">

                <h2>Experience</h2>

                <input type="number"
                       name="projects"
                       placeholder="Projects"
                       required>

                <input type="number"
                       name="internships"
                       placeholder="Internships"
                       required>

                <input type="number"
                       name="hackathons"
                       placeholder="Hackathons"
                       required>

                <input type="number"
                       name="certifications"
                       placeholder="Certifications"
                       required>

                <div class="button-group">

                    <button type="button" class="prev-btn">
                        Previous
                    </button>

                    <button type="submit" class="submit-btn">
                        Predict Placement
                    </button>

                </div>

            </div>

        </form>

    </div>

</div>

<script>
const steps = document.querySelectorAll(".form-step");
const nextBtns = document.querySelectorAll(".next-btn");
const prevBtns = document.querySelectorAll(".prev-btn");
const progress = document.getElementById("progressBar");

let currentStep = 0;

function updateSteps(){
    steps.forEach((step,index)=>{
        step.classList.remove("active");

        if(index === currentStep){
            step.classList.add("active");
        }
    });

    progress.style.width =
    ((currentStep + 1) / steps.length) * 100 + "%";
}

nextBtns.forEach(btn=>{
    btn.addEventListener("click",()=>{
        if(currentStep < steps.length - 1){
            currentStep++;
            updateSteps();
        }
    });
});

prevBtns.forEach(btn=>{
    btn.addEventListener("click",()=>{
        if(currentStep > 0){
            currentStep--;
            updateSteps();
        }
    });
});

updateSteps();
</script>

</body>
</html>
