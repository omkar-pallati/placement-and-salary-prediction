<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="predict-page">

<div class="predict-wrapper">

    <div class="predict-box">

        <h1>Create Account</h1>

        {% if error %}

            <p style="color:red;
                      text-align:center;
                      margin-bottom:20px;">

                {{ error }}

            </p>

        {% endif %}

        <form action="/signup" method="POST">

            <input type="text"
                   name="name"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit"
                    class="submit-btn">

                Sign Up

            </button>

        </form>

        <br>

        <p style="text-align:center;">

            Already have an account?

            <a href="/login">

                Login

            </a>

        </p>

    </div>

</div>

</body>
</html>
